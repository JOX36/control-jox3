name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar plataforma Android 34
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Descargar Gradle manualmente
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Compilar APK y guardar log completo
        run: gradle assembleDebug > build_log.txt 2>&1 || true

      - name: Mostrar error completo
        run: |
          echo "=== ERRORES ==="
          grep -A 10 "What went wrong" build_log.txt || echo "No se encontró What went wrong"
          echo "=== ULTIMAS 20 LINEAS ==="
          tail -20 build_log.txt

      - name: Verificar APK
        run: find . -name "*.apk" 2>/dev/null || echo "No APK generado"

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: JOX3-Remote-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
