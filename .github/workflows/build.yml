name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Dar permisos gradle wrapper
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
          unzip -q gradle.zip
          export GRADLE_HOME=$PWD/gradle-8.4
          export PATH=$GRADLE_HOME/bin:$PATH
          gradle assembleDebug

      - name: Verificar APK
        run: find . -name "*.apk" 2>/dev/null || echo "No APK"

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: JOX3-Remote-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
