name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Compilar APK debug
        run: gradle assembleDebug --info 2>&1 | grep -E "(FAILED|error:|Error|Exception|What went wrong|> Could)" | head -30

      - name: Compilar APK debug completo
        run: gradle assembleDebug
        continue-on-error: true

      - name: Verificar APK
        run: find . -name "*.apk" 2>/dev/null || echo "No APK generado"

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: JOX3-Remote-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
